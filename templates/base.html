<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Bookie{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">

        <div class="navbar">
            <p>
                <a href="{{ url_for('index') }}"><strong>Bookie</strong></a> |
                {% if user %}
                    Logged in as <strong>{{ user['username'] }}</strong> |
                    <a href="{{ url_for('recommendations') }}">AI Recommendations</a> |
                    <a href="{{ url_for('logout') }}">Log out</a>
                {% else %}
                    <a href="{{ url_for('login') }}">Log in</a> |
                    <a href="{{ url_for('register') }}">Register</a>
                {% endif %}
            </p>
        </div>

        <form action="{{ url_for('search') }}" method="GET">
            <input type="text" name="q" placeholder="Search for a book..." value="{{ request.args.get('q', '') }}">
            <button type="submit">Search</button>
        </form>

        <hr>

        {% with messages = get_flashed_messages() %}
            {% for message in messages %}
                <p class="flash-message"><strong>{{ message }}</strong></p>
            {% endfor %}
        {% endwith %}

        {% block content %}{% endblock %}

    </div>
</body>
</html>
