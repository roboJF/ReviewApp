<!DOCTYPE html>
<html>
<head><title>Register</title></head>
<body>

<!-- account registration page, the flashed messages are for things like invalid passwords and creating existing accts. -->

<h2>Register</h2>

{% with messages = get_flashed_messages() %}
    {% for message in messages %}<p>{{ message }}</p>{% endfor %}
{% endwith %}

<form method="POST">
    <p><label>Username: <input type="text" name="username" required></label></p>
    <p><label>Password (min 6 characters): <input type="password" name="password" required></label></p>
    <p><button type="submit">Register</button></p>
</form>

<a href="{{ url_for('login') }}">Already have an account? Log in</a>

</body>
</html>
